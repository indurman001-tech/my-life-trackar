<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shahad Dashboard</title>
    
    <!-- PWA / Mobile Meta Tags -->
    <meta name="theme-color" content="#0a0a0a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Shahad">
    
    <!-- Inline Manifest (Allows 'Install' on Android/PC) -->
    <link rel="manifest" href="data:application/json;base64,ewogICJpZCI6ICJzaGFoYWQtZGFzaGJvYXJkIiwKICAic2NvcGUiOiAiLyIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAibmFtZSI6ICJTaGFoYWQgRGFzaGJvYXJkIiwKICAic2hvcnRfbmFtZSI6ICJTaGFoYWQiLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwYTBhMGEiLAogICJ0aGVtZV9jb2xvciI6ICIjMGEwYTBhIiwKICAiaWNvbnMiOiBbCiAgICB7CiAgICAgICJzcmMiOiAiaHR0cHM6Ly9waWNzdW0ucGhvdG9zL3NlZWQvc2hhaGFkLzUxMiIsCiAgICAgICJzaXplcyI6ICI1MTJ4NTEyIiwKICAgICAgInR5cGUiOiAiaW1hZ2UvcG5nIiwKICAgICAgInB1cnBvc2UiOiAiYW55IG1hc2thYmxlIgogICAgfQogIF0KfQ==">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: white;
            margin: 0;
            overscroll-behavior: none;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        const STORAGE_KEY = 'shahad_dashboard_v3_offline';

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        function App() {
            const [transactions, setTransactions] = useState([]);
            const [habits, setHabits] = useState({});
            const [currentDate, setCurrentDate] = useState(new Date());
            const [desc, setDesc] = useState('');
            const [amount, setAmount] = useState('');
            const [amountError, setAmountError] = useState(false);
            const [type, setType] = useState('expense');
            const [isOffline, setIsOffline] = useState(!navigator.onLine);

            // Connection Monitor
            useEffect(() => {
                const handleOnline = () => setIsOffline(false);
                const handleOffline = () => setIsOffline(true);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        setTransactions(parsed.transactions || []);
                        setHabits(parsed.habits || {});
                    } catch (e) { console.error("Load error", e); }
                }
            }, []);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ transactions, habits }));
            }, [transactions, habits]);

            const totalBalance = useMemo(() => transactions.reduce((acc, t) => t.type === 'income' ? acc + t.amount : acc - t.amount, 0), [transactions]);
            const totalIncome = useMemo(() => transactions.filter(t => t.type === 'income').reduce((acc, t) => acc + t.amount, 0), [transactions]);
            const totalExpense = useMemo(() => transactions.filter(t => t.type === 'expense').reduce((acc, t) => acc + t.amount, 0), [transactions]);

            const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
            const habitsThisMonth = useMemo(() => {
                let count = 0;
                for (let i = 1; i <= daysInMonth; i++) {
                    if (habits[`${currentDate.getFullYear()}-${currentDate.getMonth() + 1}-${i}`]) count++;
                }
                return count;
            }, [habits, currentDate, daysInMonth]);

            const habitProgress = (habitsThisMonth / daysInMonth) * 100;

            const streak = useMemo(() => {
                let currentStreak = 0;
                let checkDate = new Date();
                while (true) {
                    const dateStr = `${checkDate.getFullYear()}-${checkDate.getMonth() + 1}-${checkDate.getDate()}`;
                    if (habits[dateStr]) {
                        currentStreak++;
                        checkDate.setDate(checkDate.getDate() - 1);
                    } else {
                        if (currentStreak === 0) {
                            checkDate.setDate(checkDate.getDate() - 1);
                            if (habits[`${checkDate.getFullYear()}-${checkDate.getMonth() + 1}-${checkDate.getDate()}`]) continue;
                        }
                        break;
                    }
                }
                return currentStreak;
            }, [habits]);

            const addTransaction = (e) => {
                e.preventDefault();
                if (!desc || !amount) return;
                setTransactions([{ id: Date.now().toString(), date: new Date().toLocaleDateString('en-CA'), description: desc, amount: parseFloat(amount), type }, ...transactions]);
                setDesc(''); setAmount(''); setAmountError(false);
            };

            return (
                <div className="min-h-screen bg-[#0a0a0a] text-white p-4 md:p-8">
                    <AnimatePresence>
                        {isOffline && (
                            <motion.div initial={{ y: -50 }} animate={{ y: 0 }} exit={{ y: -50 }} className="fixed top-0 left-0 right-0 bg-amber-500 text-black text-[10px] font-bold py-1 text-center z-50 uppercase tracking-widest">
                                Working Offline - Data saved locally
                            </motion.div>
                        )}
                    </AnimatePresence>

                    <div className="max-w-7xl mx-auto space-y-8">
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                            <div>
                                <h1 className="text-3xl font-black tracking-tighter">SHAHAD</h1>
                                <p className="text-zinc-500 text-sm font-medium uppercase tracking-widest">{new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</p>
                            </div>
                            <div className="bg-zinc-900 border border-zinc-800 p-5 rounded-2xl flex items-center gap-5">
                                <div className="p-3 bg-blue-500/10 rounded-xl"><Icon name="wallet" size={24} className="text-blue-500" /></div>
                                <div>
                                    <p className="text-[10px] font-bold uppercase text-zinc-500 tracking-widest">Balance</p>
                                    <h2 className="text-2xl font-bold">${totalBalance.toLocaleString()}</h2>
                                </div>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <section className="lg:col-span-7 space-y-6">
                                <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-6">
                                    <form onSubmit={addTransaction} className="grid grid-cols-1 sm:grid-cols-12 gap-3 mb-8">
                                        <div className="sm:col-span-5"><input type="text" placeholder="Item name" className="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500/50 outline-none" value={desc} onChange={(e) => setDesc(e.target.value)} /></div>
                                        <div className="sm:col-span-3"><input type="number" placeholder="0.00" className="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500/50 outline-none" value={amount} onChange={(e) => setAmount(e.target.value)} /></div>
                                        <div className="sm:col-span-3 flex bg-zinc-950 border border-zinc-800 rounded-xl p-1">
                                            <button type="button" onClick={() => setType('income')} className={`flex-1 py-2 rounded-lg text-[10px] font-bold uppercase ${type === 'income' ? 'bg-blue-500 text-white' : 'text-zinc-500'}`}>Income</button>
                                            <button type="button" onClick={() => setType('expense')} className={`flex-1 py-2 rounded-lg text-[10px] font-bold uppercase ${type === 'expense' ? 'bg-rose-500 text-white' : 'text-zinc-500'}`}>Expense</button>
                                        </div>
                                        <div className="sm:col-span-1"><button type="submit" className="w-full h-full bg-white text-black rounded-xl flex items-center justify-center hover:scale-105 transition-transform"><Icon name="plus" size={20} /></button></div>
                                    </form>
                                    <div className="space-y-3">
                                        {transactions.map(t => (
                                            <div key={t.id} className="flex items-center justify-between p-4 bg-zinc-950/50 border border-zinc-800/50 rounded-xl group">
                                                <div>
                                                    <p className="font-bold text-sm">{t.description}</p>
                                                    <p className="text-[10px] text-zinc-600 font-mono uppercase">{t.date}</p>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <p className={`font-black ${t.type === 'income' ? 'text-blue-400' : 'text-rose-400'}`}>{t.type === 'income' ? '+' : '-'}${t.amount.toLocaleString()}</p>
                                                    <button onClick={() => setTransactions(transactions.filter(tr => tr.id !== t.id))} className="text-zinc-800 hover:text-rose-500 transition-colors"><Icon name="trash-2" size={14} /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </section>

                            <section className="lg:col-span-5 space-y-6">
                                <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-6">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="font-bold text-sm uppercase tracking-widest">Habit Streak</h3>
                                        <div className="px-3 py-1 bg-emerald-500/10 border border-emerald-500/20 rounded-full text-emerald-400 text-xs font-black">{streak} DAYS</div>
                                    </div>
                                    <div className="grid grid-cols-7 gap-2">
                                        {Array.from({ length: daysInMonth }).map((_, i) => {
                                            const day = i + 1;
                                            const dateStr = `${currentDate.getFullYear()}-${currentDate.getMonth() + 1}-${day}`;
                                            const isChecked = habits[dateStr];
                                            return (
                                                <button key={day} onClick={() => setHabits(prev => ({ ...prev, [dateStr]: !prev[dateStr] }))} className={`aspect-square rounded-lg text-[10px] font-bold transition-all ${isChecked ? 'bg-emerald-500 text-white' : 'bg-zinc-800 text-zinc-600 hover:bg-zinc-700'}`}>
                                                    {day}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            </section>
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
