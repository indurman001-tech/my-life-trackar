<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shahad Dashboard</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1a1a1a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: white;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        const STORAGE_KEY = 'shahad_dashboard_data_v2';

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        function App() {
            const [transactions, setTransactions] = useState([]);
            const [habits, setHabits] = useState({});
            const [currentDate, setCurrentDate] = useState(new Date());
            const [dashboardName, setDashboardName] = useState('Shahad Dashboard');
            const [isEditingName, setIsEditingName] = useState(false);
            const [desc, setDesc] = useState('');
            const [amount, setAmount] = useState('');
            const [amountError, setAmountError] = useState(false);
            const [type, setType] = useState('expense');

            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        setTransactions(parsed.transactions || []);
                        setHabits(parsed.habits || {});
                        if (parsed.dashboardName) setDashboardName(parsed.dashboardName);
                    } catch (e) { console.error("Failed to load data", e); }
                }
            }, []);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ transactions, habits, dashboardName }));
            }, [transactions, habits, dashboardName]);

            const totalBalance = useMemo(() => transactions.reduce((acc, t) => t.type === 'income' ? acc + t.amount : acc - t.amount, 0), [transactions]);
            const totalIncome = useMemo(() => transactions.filter(t => t.type === 'income').reduce((acc, t) => acc + t.amount, 0), [transactions]);
            const totalExpense = useMemo(() => transactions.filter(t => t.type === 'expense').reduce((acc, t) => acc + t.amount, 0), [transactions]);

            const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
            const habitsThisMonth = useMemo(() => {
                let count = 0;
                for (let i = 1; i <= daysInMonth; i++) {
                    if (habits[`${currentDate.getFullYear()}-${currentDate.getMonth() + 1}-${i}`]) count++;
                }
                return count;
            }, [habits, currentDate, daysInMonth]);

            const habitProgress = (habitsThisMonth / daysInMonth) * 100;

            const streak = useMemo(() => {
                let currentStreak = 0;
                let checkDate = new Date();
                while (true) {
                    const dateStr = `${checkDate.getFullYear()}-${checkDate.getMonth() + 1}-${checkDate.getDate()}`;
                    if (habits[dateStr]) { currentStreak++; checkDate.setDate(checkDate.getDate() - 1); }
                    else {
                        if (currentStreak === 0) {
                            checkDate.setDate(checkDate.getDate() - 1);
                            if (habits[`${checkDate.getFullYear()}-${checkDate.getMonth() + 1}-${checkDate.getDate()}`]) continue;
                        }
                        break;
                    }
                }
                return currentStreak;
            }, [habits]);

            const addTransaction = (e) => {
                e.preventDefault();
                if (!desc || !amount) return;
                setTransactions([{ id: Date.now().toString(), date: new Date().toLocaleDateString('en-CA'), description: desc, amount: parseFloat(amount), type }, ...transactions]);
                setDesc(''); setAmount(''); setAmountError(false);
            };

            const handleAmountKeyDown = (e) => {
                if ([8, 46, 9, 27, 13, 110, 190].indexOf(e.keyCode) !== -1 || (e.keyCode === 65 && (e.ctrlKey || e.metaKey)) || (e.keyCode >= 35 && e.keyCode <= 40)) return;
                if ((e.shiftKey || (e.keyCode < 48 || e.keyCode > 57)) && (e.keyCode < 96 || e.keyCode > 105)) e.preventDefault();
            };

            const handleAmountPaste = (e) => {
                if (!/^\d*\.?\d*$/.test(e.clipboardData.getData('text'))) {
                    e.preventDefault(); setAmountError(true); setTimeout(() => setAmountError(false), 3000);
                }
            };

            const changeMonth = (offset) => {
                setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + offset, 1));
            };

            return (
                <div className="min-h-screen bg-[#0a0a0a] text-white p-4 md:p-8">
                    <div className="max-w-7xl mx-auto space-y-8">
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                            <div className="space-y-1">
                                {isEditingName ? (
                                    <input autoFocus className="text-3xl font-bold tracking-tight bg-transparent border-b border-zinc-700 outline-none w-full" value={dashboardName} onChange={(e) => setDashboardName(e.target.value)} onBlur={() => setIsEditingName(false)} onKeyDown={(e) => e.key === 'Enter' && setIsEditingName(false)} />
                                ) : (
                                    <h1 className="text-3xl font-bold tracking-tight cursor-pointer hover:text-blue-400 transition-colors flex items-center gap-2" onClick={() => setIsEditingName(true)}>
                                        {dashboardName} <Icon name="edit-3" size={16} className="opacity-30" />
                                    </h1>
                                )}
                                <p className="text-zinc-400 flex items-center gap-2"><Icon name="calendar" size={16} />{new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                            </div>
                            <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="w-full md:w-auto bg-zinc-900 border border-zinc-800 p-6 rounded-2xl shadow-xl flex items-center gap-6">
                                <div className="p-3 bg-blue-500/10 rounded-xl"><Icon name="wallet" size={24} className="text-blue-500" /></div>
                                <div><p className="text-xs font-semibold uppercase tracking-wider text-zinc-500">Total Balance</p><h2 className={`text-3xl font-bold ${totalBalance >= 0 ? 'text-blue-400' : 'text-rose-400'}`}>${totalBalance.toLocaleString()}</h2></div>
                            </motion.div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <section className="lg:col-span-7 space-y-6">
                                <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-sm">
                                    <h3 className="text-xl font-bold mb-6 flex items-center gap-2"><Icon name="trending-up" size={20} className="text-blue-500" />Money Tracker</h3>
                                    <form onSubmit={addTransaction} className="grid grid-cols-1 sm:grid-cols-12 gap-4 mb-8">
                                        <div className="sm:col-span-5"><input type="text" placeholder="Description" className="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50" value={desc} onChange={(e) => setDesc(e.target.value)} /></div>
                                        <div className="sm:col-span-3 relative">
                                            <input type="number" placeholder="Amount" step="0.01" inputMode="decimal" className={`w-full bg-zinc-950 border ${amountError ? 'border-rose-500' : 'border-zinc-800'} rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50`} value={amount} onKeyDown={handleAmountKeyDown} onPaste={handleAmountPaste} onChange={(e) => { setAmount(e.target.value); if (amountError) setAmountError(false); }} />
                                            <AnimatePresence>{amountError && <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: 10 }} className="absolute -bottom-6 left-0 text-[10px] font-bold text-rose-500 uppercase">Numbers only, please!</motion.div>}</AnimatePresence>
                                        </div>
                                        <div className="sm:col-span-3 flex bg-zinc-950 border border-zinc-800 rounded-xl p-1">
                                            <button type="button" onClick={() => setType('income')} className={`flex-1 py-2 rounded-lg text-xs font-bold ${type === 'income' ? 'bg-blue-500 text-white' : 'text-zinc-500'}`}>Income</button>
                                            <button type="button" onClick={() => setType('expense')} className={`flex-1 py-2 rounded-lg text-xs font-bold ${type === 'expense' ? 'bg-rose-500 text-white' : 'text-zinc-500'}`}>Expense</button>
                                        </div>
                                        <div className="sm:col-span-1"><button type="submit" className="w-full h-full bg-zinc-100 text-black rounded-xl flex items-center justify-center hover:bg-white"><Icon name="plus" size={20} /></button></div>
                                    </form>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead><tr className="text-zinc-500 text-xs uppercase tracking-widest border-b border-zinc-800"><th className="pb-4">Date</th><th className="pb-4">Item</th><th className="pb-4 text-right">Amount</th><th className="pb-4"></th></tr></thead>
                                            <tbody className="divide-y divide-zinc-800/50">
                                                {transactions.length === 0 ? <tr><td colSpan={4} className="py-12 text-center text-zinc-500 italic">No transactions yet.</td></tr> : 
                                                transactions.map((t) => (
                                                    <tr key={t.id} className="group hover:bg-zinc-800/30 transition-colors">
                                                        <td className="py-4 text-sm text-zinc-400 font-mono">{t.date}</td>
                                                        <td className="py-4 font-medium">{t.description}</td>
                                                        <td className={`py-4 text-right font-bold ${t.type === 'income' ? 'text-blue-400' : 'text-rose-400'}`}>{t.type === 'income' ? '+' : '-'}${t.amount.toLocaleString()}</td>
                                                        <td className="py-4 text-right"><button onClick={() => setTransactions(transactions.filter(tr => tr.id !== t.id))} className="p-2 text-zinc-600 hover:text-rose-500 opacity-0 group-hover:opacity-100"><Icon name="trash-2" size={16} /></button></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div className="bg-zinc-900 border border-zinc-800 p-6 rounded-2xl"><p className="text-xs font-bold text-zinc-500 uppercase mb-2">Monthly Income</p><p className="text-2xl font-bold text-blue-400">${totalIncome.toLocaleString()}</p></div>
                                    <div className="bg-zinc-900 border border-zinc-800 p-6 rounded-2xl"><p className="text-xs font-bold text-zinc-500 uppercase mb-2">Monthly Expenses</p><p className="text-2xl font-bold text-rose-400">${totalExpense.toLocaleString()}</p></div>
                                </div>
                            </section>

                            <section className="lg:col-span-5 space-y-6">
                                <div className="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-sm h-full">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="text-xl font-bold flex items-center gap-2"><Icon name="check-circle-2" size={20} className="text-emerald-500" />Habit Tracker</h3>
                                        <div className="flex items-center gap-3 bg-emerald-500/10 px-4 py-2 rounded-full border border-emerald-500/20">
                                            <span className="text-xs font-bold text-emerald-500 uppercase tracking-widest">Streak</span>
                                            <span className="text-xl font-black text-emerald-400">{streak}</span>
                                        </div>
                                    </div>
                                    <div className="mb-8 space-y-2">
                                        <div className="flex justify-between text-xs font-bold uppercase tracking-widest text-zinc-500"><span>MONTHLY PROGRESS</span><span>{Math.round(habitProgress)}%</span></div>
                                        <div className="h-2 w-full bg-zinc-800 rounded-full overflow-hidden"><motion.div initial={{ width: 0 }} animate={{ width: `${habitProgress}%` }} className="h-full bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.5)]" /></div>
                                    </div>
                                    <div className="flex items-center justify-between mb-6">
                                        <h4 className="text-lg font-semibold">{currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</h4>
                                        <div className="flex gap-2">
                                            <button onClick={() => changeMonth(-1)} className="p-2 hover:bg-zinc-800 rounded-lg transition-colors"><Icon name="chevron-left" size={20} /></button>
                                            <button onClick={() => changeMonth(1)} className="p-2 hover:bg-zinc-800 rounded-lg transition-colors"><Icon name="chevron-right" size={20} /></button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-7 gap-2">
                                        {['S','M','T','W','T','F','S'].map(d => <div key={d} className="text-center text-[10px] font-bold text-zinc-600 mb-2 uppercase">{d}</div>)}
                                        {Array.from({ length: new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay() }).map((_, i) => <div key={i} />)}
                                        {Array.from({ length: daysInMonth }).map((_, i) => {
                                            const day = i + 1;
                                            const dateStr = `${currentDate.getFullYear()}-${currentDate.getMonth() + 1}-${day}`;
                                            const isChecked = habits[dateStr];
                                            const isToday = new Date().toDateString() === new Date(currentDate.getFullYear(), currentDate.getMonth(), day).toDateString();
                                            return <button key={day} onClick={() => setHabits(prev => ({ ...prev, [dateStr]: !prev[dateStr] }))} className={`aspect-square rounded-lg text-sm font-medium transition-all relative ${isChecked ? 'bg-emerald-500 text-white shadow-[0_0_15px_rgba(16,185,129,0.3)]' : 'bg-zinc-800/50 text-zinc-500'} ${isToday ? 'ring-2 ring-blue-500 ring-offset-2 ring-offset-[#0a0a0a]' : ''}`}>{day}</button>;
                                        })}
                                    </div>
                                    <div className="mt-8 p-4 bg-zinc-800/30 rounded-xl border border-zinc-800/50">
                                        <p className="text-xs text-zinc-400 leading-relaxed"><span className="text-emerald-400 font-bold">Tip:</span> Consistency is key. Even checking off one small habit every day builds a powerful momentum over time.</p>
                                    </div>
                                </div>
                            </section>
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
