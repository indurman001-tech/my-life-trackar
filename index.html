<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    .input-f {
      width: 100%; padding: 12px 14px; border-radius: 10px;
      border: 1.5px solid #e2e8f0; background: #f8fafc;
      font-size: 14px; color: #1e293b; outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .input-f:focus { border-color: #6366f1; background: #fff; box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
    .input-f.err { border-color: #f87171; }
    .btn-submit {
      width: 100%; padding: 13px; border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; font-weight: 700; font-size: 15px;
      border: none; cursor: pointer;
      transition: transform .15s, box-shadow .2s;
    }
    .btn-submit:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(99,102,241,.35); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .spinner { display:inline-block; width:16px; height:16px; border:2.5px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:6px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .fade-in { animation: fadeIn .4s ease forwards; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4">

<div class="fixed inset-0 pointer-events-none overflow-hidden">
  <div class="absolute -top-32 -left-32 w-80 h-80 rounded-full bg-indigo-100/60 blur-3xl"></div>
  <div class="absolute -bottom-32 -right-32 w-80 h-80 rounded-full bg-purple-100/60 blur-3xl"></div>
</div>

<div class="relative w-full max-w-md">

  <!-- FORM -->
  <div id="form-card" class="bg-white rounded-2xl border border-slate-200 p-8 shadow-sm fade-in">
    <div class="text-center mb-7">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4"
           style="background:linear-gradient(135deg,#6366f1,#8b5cf6);box-shadow:0 8px 20px rgba(99,102,241,.3);">
        <svg width="24" height="24" fill="none" stroke="#fff" stroke-width="2.2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-extrabold text-slate-800">Sign Up</h1>
      <p class="text-sm text-slate-400 mt-1">Fill in your details below</p>
    </div>

    <form id="signupForm" novalidate>
      <div class="space-y-4">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5 block">First Name</label>
            <input class="input-f" type="text" id="firstName" placeholder="John"/>
            <p class="text-xs text-red-400 mt-1 hidden" id="err-first">Required</p>
          </div>
          <div>
            <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5 block">Last Name</label>
            <input class="input-f" type="text" id="lastName" placeholder="Doe"/>
            <p class="text-xs text-red-400 mt-1 hidden" id="err-last">Required</p>
          </div>
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5 block">Email Address</label>
          <input class="input-f" type="email" id="email" placeholder="john@example.com"/>
          <p class="text-xs text-red-400 mt-1 hidden" id="err-email">Enter a valid email</p>
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5 block">Phone Number</label>
          <input class="input-f" type="tel" id="phone" placeholder="+880 1XXX-XXXXXX"/>
          <p class="text-xs text-red-400 mt-1 hidden" id="err-phone">Required</p>
        </div>
        <p id="form-error" class="text-xs text-red-500 bg-red-50 rounded-lg px-3 py-2.5 hidden"></p>
        <div class="pt-1">
          <button type="submit" class="btn-submit" id="submit-btn">
            <span id="btn-label">Submit</span>
          </button>
        </div>
      </div>
    </form>
    <p class="text-center text-xs text-slate-300 mt-6">🔐 Your data is securely saved</p>
  </div>

  <!-- SUCCESS -->
  <div id="success-card" class="hidden bg-white rounded-2xl border border-slate-200 p-10 shadow-sm text-center fade-in">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-100 mb-5">
      <svg width="32" height="32" fill="none" stroke="#10b981" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <h2 class="text-xl font-extrabold text-slate-800 mb-2">Thank You!</h2>
    <p class="text-sm text-slate-400 mb-6">Your information has been submitted successfully.</p>
    <button onclick="resetForm()" class="text-sm font-semibold text-indigo-500 hover:underline">
      Submit another response →
    </button>
  </div>

</div>

<script>
  const API = '/api/submit';

  function setErr(iId, eId, show) {
    document.getElementById(iId).classList.toggle('err', show);
    document.getElementById(eId).classList.toggle('hidden', !show);
  }

  function validate(f, l, e, p) {
    let ok = true;
    if (!f) { setErr('firstName','err-first',true); ok=false; } else setErr('firstName','err-first',false);
    if (!l) { setErr('lastName','err-last',true);  ok=false; } else setErr('lastName','err-last',false);
    if (!e || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)) { setErr('email','err-email',true); ok=false; } else setErr('email','err-email',false);
    if (!p) { setErr('phone','err-phone',true);   ok=false; } else setErr('phone','err-phone',false);
    return ok;
  }

  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const first = document.getElementById('firstName').value.trim();
    const last  = document.getElementById('lastName').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    if (!validate(first, last, email, phone)) return;

    const btn   = document.getElementById('submit-btn');
    const lbl   = document.getElementById('btn-label');
    const errEl = document.getElementById('form-error');
    errEl.classList.add('hidden');
    btn.disabled = true;
    lbl.innerHTML = '<span class="spinner"></span>Saving…';

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ first_name: first, last_name: last, email, phone })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Something went wrong');

      document.getElementById('form-card').classList.add('hidden');
      document.getElementById('success-card').classList.remove('hidden');
    } catch(err) {
      errEl.textContent = '⚠ ' + err.message;
      errEl.classList.remove('hidden');
    } finally {
      btn.disabled = false;
      lbl.textContent = 'Submit';
    }
  });

  function resetForm() {
    document.getElementById('signupForm').reset();
    document.getElementById('success-card').classList.add('hidden');
    document.getElementById('form-card').classList.remove('hidden');
  }
</script>
</body>
</html>
