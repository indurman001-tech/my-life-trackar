<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentAI — Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@600;700&family=Cabinet+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--acc:#7c5cfc;--acc2:#a78bfa;--grn:#00e5a0;--red:#ff4d6a;--brd:rgba(255,255,255,.1);}
body{background:#060610;color:#fff;font-family:'Cabinet Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;}
.orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.35;}
.o1{width:500px;height:500px;background:#7c5cfc;top:-150px;left:-100px;}
.o2{width:400px;height:400px;background:#00e5a0;bottom:-100px;right:-100px;}
.o3{width:300px;height:300px;background:#ff4d6a;top:50%;right:-50px;}
.card{position:relative;z-index:1;width:100%;max-width:440px;background:rgba(255,255,255,.04);backdrop-filter:blur(32px);border:1px solid var(--brd);border-radius:24px;padding:40px 36px;box-shadow:0 8px 64px rgba(0,0,0,.5);}
.logo{font-family:'Clash Display',sans-serif;font-size:22px;font-weight:700;background:linear-gradient(135deg,#fff,var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:6px;}
.subtitle{text-align:center;font-size:13px;color:rgba(255,255,255,.5);margin-bottom:28px;}
/* TABS */
.tabs{display:flex;background:rgba(255,255,255,.06);border-radius:10px;padding:3px;margin-bottom:28px;}
.tab{flex:1;padding:9px;border-radius:8px;font-family:'Cabinet Grotesk',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.45);transition:all .2s;}
.tab.on{background:var(--acc);color:#fff;box-shadow:0 2px 12px rgba(124,92,252,.4);}
/* FORM */
.form{display:flex;flex-direction:column;gap:14px;}
.field{display:flex;flex-direction:column;gap:6px;}
.lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.8px;}
.inp{padding:12px 14px;border-radius:10px;border:1.5px solid var(--brd);background:rgba(255,255,255,.05);color:#fff;font-size:14px;font-family:'Cabinet Grotesk',sans-serif;outline:none;transition:all .2s;}
.inp:focus{border-color:var(--acc);background:rgba(124,92,252,.08);box-shadow:0 0 0 3px rgba(124,92,252,.15);}
.inp::placeholder{color:rgba(255,255,255,.2);}
.inp.err{border-color:var(--red);}
.pass-wrap{position:relative;}
.pass-wrap .inp{padding-right:44px;width:100%;}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:16px;}
.err-msg{font-size:11px;color:var(--red);margin-top:2px;}
.submit-btn{width:100%;padding:14px;border-radius:11px;background:linear-gradient(135deg,#7c5cfc,#a78bfa);color:#fff;font-family:'Clash Display',sans-serif;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;box-shadow:0 4px 24px rgba(124,92,252,.3);}
.submit-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 32px rgba(124,92,252,.5);}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.divider{display:flex;align-items:center;gap:12px;margin:4px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08);}
.divider span{font-size:11px;color:rgba(255,255,255,.3);}
.google-btn{width:100%;padding:13px;border-radius:11px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#fff;font-family:'Cabinet Grotesk',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:9px;}
.google-btn:hover{background:rgba(255,255,255,.08);}
.toast{position:fixed;bottom:24px;right:24px;padding:13px 18px;border-radius:12px;font-size:13px;font-weight:600;color:#fff;z-index:999;animation:toastIn .3s ease;display:flex;align-items:center;gap:8px;}
.toast.ok{background:rgba(0,229,160,.15);border:1px solid rgba(0,229,160,.3);}
.toast.bad{background:rgba(255,77,106,.15);border:1px solid rgba(255,77,106,.3);}
@keyframes toastIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
</div>

<div class="card">
  <div class="logo">ContentAI ⚡</div>
  <div class="subtitle">Your AI content studio</div>

  <div class="tabs">
    <button class="tab on" id="tabReg" onclick="showTab('reg')">Create Account</button>
    <button class="tab" id="tabLog" onclick="showTab('log')">Sign In</button>
  </div>

  <!-- REGISTER FORM -->
  <div id="formReg" class="form">
    <div class="field">
      <div class="lbl">Full Name</div>
      <input class="inp" id="regName" type="text" placeholder="Your full name" autocomplete="name">
      <div class="err-msg" id="errRegName"></div>
    </div>
    <div class="field">
      <div class="lbl">Email Address</div>
      <input class="inp" id="regEmail" type="email" placeholder="you@email.com" autocomplete="email">
      <div class="err-msg" id="errRegEmail"></div>
    </div>
    <div class="field">
      <div class="lbl">Phone Number</div>
      <input class="inp" id="regPhone" type="tel" placeholder="+880 1XXX XXXXXX" autocomplete="tel">
      <div class="err-msg" id="errRegPhone"></div>
    </div>
    <div class="field">
      <div class="lbl">Password</div>
      <div class="pass-wrap">
        <input class="inp" id="regPass" type="password" placeholder="Min. 8 characters" autocomplete="new-password">
        <button class="eye" onclick="togglePass('regPass',this)" type="button">👁</button>
      </div>
      <div class="err-msg" id="errRegPass"></div>
    </div>
    <button class="submit-btn" id="regBtn" onclick="doRegister()">
      <span id="regBtnTxt">Create Account →</span>
    </button>
    <div class="divider"><span>or</span></div>
    <button class="google-btn" onclick="doGoogle()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- LOGIN FORM -->
  <div id="formLog" class="form" style="display:none;">
    <div class="field">
      <div class="lbl">Email Address</div>
      <input class="inp" id="logEmail" type="email" placeholder="you@email.com" autocomplete="email">
      <div class="err-msg" id="errLogEmail"></div>
    </div>
    <div class="field">
      <div class="lbl">Password</div>
      <div class="pass-wrap">
        <input class="inp" id="logPass" type="password" placeholder="Your password" autocomplete="current-password">
        <button class="eye" onclick="togglePass('logPass',this)" type="button">👁</button>
      </div>
      <div class="err-msg" id="errLogPass"></div>
    </div>
    <button style="background:none;border:none;color:var(--acc2);font-size:12px;font-family:'Cabinet Grotesk',sans-serif;cursor:pointer;text-align:right;align-self:flex-end;" onclick="doReset()">Forgot password?</button>
    <button class="submit-btn" id="logBtn" onclick="doLogin()">
      <span id="logBtnTxt">Sign In →</span>
    </button>
    <div class="divider"><span>or</span></div>
    <button class="google-btn" onclick="doGoogle()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, browserLocalPersistence, setPersistence, sendPasswordResetEmail, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FB = {
  apiKey: "AIzaSyBY1tdklkGFsXlrJZkzrPbe-eBqFMK3oog",
  authDomain: "ai-content-manager-d5008.firebaseapp.com",
  projectId: "ai-content-manager-d5008",
  storageBucket: "ai-content-manager-d5008.firebasestorage.app",
  messagingSenderId: "441712659521",
  appId: "1:441712659521:web:754534ffc10bf55025cac0"
};

const app = initializeApp(FB);
const auth = getAuth(app);
const db = getFirestore(app);
const gProvider = new GoogleAuthProvider();

// ROUTE GUARD — if already logged in, go to dashboard
onAuthStateChanged(auth, function(user) {
  if (user) window.location.href = "dashboard.html";
});

// Set local persistence so users stay logged in
setPersistence(auth, browserLocalPersistence);

// ── REGISTER ──
window.doRegister = async function() {
  clearErrors();
  var name = document.getElementById("regName").value.trim();
  var email = document.getElementById("regEmail").value.trim();
  var phone = document.getElementById("regPhone").value.trim();
  var pass = document.getElementById("regPass").value;
  var ok = true;
  if (!name) { showErr("errRegName","Name is required."); ok=false; }
  if (!email || !email.includes("@")) { showErr("errRegEmail","Valid email required."); ok=false; }
  if (!phone || phone.length < 7) { showErr("errRegPhone","Valid phone required."); ok=false; }
  if (pass.length < 8) { showErr("errRegPass","Password must be 8+ characters."); ok=false; }
  if (!ok) return;
  setBusy("regBtn","regBtnTxt",true);
  try {
    var cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    // Init Firestore user doc
    await setDoc(doc(db,"users",cred.user.uid), {
      uid: cred.user.uid, name, email, phone,
      plan: "Free", expiryDate: null,
      dailyCount: 0, dailyReset: serverTimestamp(),
      createdAt: serverTimestamp(), referralCode: genRef()
    });
    toast("✅ Account created! Welcome to ContentAI.", "ok");
    setTimeout(function(){ window.location.href="dashboard.html"; }, 1200);
  } catch(e) {
    toast("❌ " + friendlyError(e.code), "bad");
  }
  setBusy("regBtn","regBtnTxt",false);
};

// ── LOGIN ──
window.doLogin = async function() {
  clearErrors();
  var email = document.getElementById("logEmail").value.trim();
  var pass = document.getElementById("logPass").value;
  if (!email) { showErr("errLogEmail","Email required."); return; }
  if (!pass) { showErr("errLogPass","Password required."); return; }
  setBusy("logBtn","logBtnTxt",true);
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    toast("✅ Welcome back!", "ok");
    setTimeout(function(){ window.location.href="dashboard.html"; }, 800);
  } catch(e) {
    toast("❌ " + friendlyError(e.code), "bad");
  }
  setBusy("logBtn","logBtnTxt",false);
};

// ── GOOGLE ──
window.doGoogle = async function() {
  try {
    var result = await signInWithPopup(auth, gProvider);
    var user = result.user;
    var snap = await getDoc(doc(db,"users",user.uid));
    if (!snap.exists()) {
      await setDoc(doc(db,"users",user.uid), {
        uid: user.uid, name: user.displayName||"User",
        email: user.email, phone: "", plan: "Free",
        expiryDate: null, dailyCount: 0, dailyReset: serverTimestamp(),
        createdAt: serverTimestamp(), referralCode: genRef()
      });
    }
    window.location.href = "dashboard.html";
  } catch(e) {
    toast("❌ " + friendlyError(e.code), "bad");
  }
};

// ── RESET ──
window.doReset = async function() {
  var email = document.getElementById("logEmail").value.trim();
  if (!email) { showErr("errLogEmail","Enter your email first."); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    toast("📧 Reset email sent! Check your inbox.", "ok");
  } catch(e) {
    toast("❌ " + friendlyError(e.code), "bad");
  }
};

function genRef() {
  return "REF" + Math.random().toString(36).substring(2,8).toUpperCase();
}
function friendlyError(code) {
  var m = { "auth/email-already-in-use":"This email is already registered.", "auth/user-not-found":"No account found with that email.", "auth/wrong-password":"Incorrect password.", "auth/too-many-requests":"Too many attempts. Try again later.", "auth/weak-password":"Password too weak.", "auth/invalid-email":"Invalid email address." };
  return m[code] || "Something went wrong. Try again.";
}
</script>

<script>
function showTab(t) {
  document.getElementById("formReg").style.display = t==="reg"?"flex":"none";
  document.getElementById("formLog").style.display = t==="log"?"flex":"none";
  document.getElementById("tabReg").className = "tab"+(t==="reg"?" on":"");
  document.getElementById("tabLog").className = "tab"+(t==="log"?" on":"");
}
function togglePass(id, btn) {
  var inp = document.getElementById(id);
  var isPass = inp.type==="password";
  inp.type = isPass ? "text" : "password";
  btn.textContent = isPass ? "🙈" : "👁";
}
function clearErrors() {
  document.querySelectorAll(".err-msg").forEach(function(e){e.textContent="";});
}
function showErr(id, msg) {
  var el = document.getElementById(id); if(el) el.textContent = msg;
}
function setBusy(btnId, txtId, busy) {
  var btn = document.getElementById(btnId), txt = document.getElementById(txtId);
  if(!btn) return;
  btn.disabled = busy;
  if(busy) btn.innerHTML = "<div class='spinner'></div>";
  else btn.innerHTML = "<span id='"+txtId+"'>"+(txtId==="regBtnTxt"?"Create Account →":"Sign In →")+"</span>";
}
function toast(msg, type) {
  var t = document.createElement("div");
  t.className = "toast " + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 4000);
}
</script>
</body>
</html>
